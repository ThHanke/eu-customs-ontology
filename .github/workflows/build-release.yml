name: Build & Release Ontology

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      chapters:
        description: 'Chapters to build (22 | all | 22,23,...)'
        default: '22'
        required: true
        type: string
      dry_run:
        description: 'Build and test without creating a release'
        type: boolean
        default: false
      force_rebuild:
        description: 'Release even if output TTL is unchanged'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Resolve the chapter list into a JSON matrix array
  # ─────────────────────────────────────────────────────────
  setup:
    name: Resolve chapters
    runs-on: ubuntu-latest
    outputs:
      chapters: ${{ steps.matrix.outputs.chapters }}
    steps:
      - id: matrix
        run: |
          INPUT="${{ inputs.chapters || '22' }}"
          if [ "$INPUT" = "all" ]; then
            CHAPTERS=$(python3 -c "import json; print(json.dumps([f'{i:02d}' for i in range(1, 100)]))")
          else
            CHAPTERS=$(python3 -c "
          import json, sys
          s = '$INPUT'
          print(json.dumps([x.strip().zfill(2) for x in s.split(',')]))
          ")
          fi
          echo "chapters=$CHAPTERS" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────
  # 2. Fetch sources, scrape wizard, build & validate ontology
  # ─────────────────────────────────────────────────────────
  build:
    name: Build ch${{ matrix.chapter }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chapter: ${{ fromJson(needs.setup.outputs.chapters) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Full pipeline: fetch TARIC → scrape wizard → build OWL →
      # Konclude consistency check → SPARQL acceptance test
      - name: Run pipeline
        run: python -m src.pipeline --chapter ${{ matrix.chapter }} --force
        env:
          KONCLUDE_CLI_PATH: ${{ github.workspace }}/tools/konclude/cli.js

      # Compare SHA256 of the generated TTL to the last released SHA256.
      # We use ls -t so we always pick the newest file when multiple dates exist.
      - name: Detect output change
        id: changed
        run: |
          CH="${{ matrix.chapter }}"
          TTL=$(ls -t data/ontology/eucn-ch${CH}-*.ttl 2>/dev/null | head -1)
          if [ -z "$TTL" ]; then
            echo "ERROR: pipeline produced no TTL for chapter $CH" >&2
            exit 1
          fi
          CURRENT=$(sha256sum "$TTL" | awk '{print $1}')
          CACHED=$(cat .github/cache/ch${CH}-ttl.sha256 2>/dev/null || true)
          FORCE="${{ inputs.force_rebuild }}"
          if [ "$CURRENT" != "$CACHED" ] || [ "$FORCE" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # Stage the new hash for the release job to commit
            echo "$CURRENT" > /tmp/ch${CH}-ttl.sha256
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Output unchanged — skipping release for chapter $CH"
          fi

      - name: Upload ontology files
        if: steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ontology-ch${{ matrix.chapter }}
          path: |
            data/ontology/eucn-ch${{ matrix.chapter }}-*.ttl
            data/ontology/eucn-ch${{ matrix.chapter }}-*.trig
          if-no-files-found: error
          retention-days: 1

      - name: Upload updated SHA256
        if: steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sha256-ch${{ matrix.chapter }}
          path: /tmp/ch${{ matrix.chapter }}-ttl.sha256
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # 3. Create a GitHub Release from all changed chapters
  # ─────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Skip if build failed entirely or dry_run requested
    if: ${{ !cancelled() && !inputs.dry_run && needs.build.result != 'failure' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ontology artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ontology-ch*
          merge-multiple: true
          path: release-files/
        continue-on-error: true   # OK if no chapters changed

      - name: Download SHA256 updates
        uses: actions/download-artifact@v4
        with:
          pattern: sha256-ch*
          merge-multiple: true
          path: .github/cache/
        continue-on-error: true

      - name: Check for releasable files
        id: has-files
        run: |
          if ls release-files/*.ttl 2>/dev/null | head -1 > /dev/null; then
            echo "yes=true" >> "$GITHUB_OUTPUT"
          else
            echo "yes=false" >> "$GITHUB_OUTPUT"
            echo "No changed chapters — nothing to release."
          fi

      - name: Get release date tag
        id: date
        if: steps.has-files.outputs.yes == 'true'
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.has-files.outputs.yes == 'true'
        run: |
          TAG="ontology-${{ steps.date.outputs.value }}-r${{ github.run_number }}"
          NOTES="Automated ontology build — sources changed since last release.

          **Data sources**
          - TARIC/CIRCABC: https://circabc.europa.eu/ui/group/0e5f18c2-4b2f-42e9-aed4-dfe50ae1263b
          - EU classification wizard: https://auskunft.ezt-online.de/ezto/SeqEinreihungSucheAnzeige.do

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh release create "$TAG" \
            --title "Ontology ${{ steps.date.outputs.value }}" \
            --notes "$NOTES" \
            release-files/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Persist updated SHA256 hashes so the next run knows what was last released
      - name: Commit updated SHA256 cache
        if: steps.has-files.outputs.yes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/cache/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update ontology build cache [skip ci]"
            git push
          fi

      # Trigger docs.yml to publish Widoco HTML for the new release.
      # Dispatches for chapter 22 (pilot); re-trigger manually for other chapters.
      - name: Trigger documentation build
        if: steps.has-files.outputs.yes == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: trigger-docs
          client-payload: >-
            {
              "version": "ontology-${{ steps.date.outputs.value }}-r${{ github.run_number }}",
              "chapter": "${{ inputs.chapters || '22' }}"
            }

  # ─────────────────────────────────────────────────────────
  # 4. Always write a job summary (incl. dry-run notice)
  # ─────────────────────────────────────────────────────────
  summary:
    name: Summary
    needs: [build, release]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Write job summary
        run: |
          {
            echo "## Ontology Build Summary"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| Release | ${{ needs.release.result }} |"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo ""
              echo "> **Dry run** — build and tests ran, no release created."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

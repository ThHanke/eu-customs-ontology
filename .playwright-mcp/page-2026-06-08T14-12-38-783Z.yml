            - cell [ref=e1394]:
              - generic [ref=e1395]:
                - text: I. According to Council Regulation (EU) No 692/2014, it shall be prohibited to import into European Union goods originating in Crimea or Sevastopol.
                - text: The prohibition shall not apply in respect of goods originating in Crimea or Sevastopol which have been made available to the Ukrainian authorities for examination, for which compliance with the conditions conferring entitlement to preferential origin has been verified and for which a certificate of origin has been issued in accordance with the Association Agreement between the European Union and its Member States, of the one part, and Ukraine, of the other part.
                - text: "II. According to the Council Regulation (EU) 692/2014, the export of goods and technologies suited for use in the sectors of transport; telecommunications; energy; prospection, exploration and production of oil, gas and mineral resources is prohibited:"
                - text: (a) to any natural or legal person, entity or body in Crimea or Sevastopol, or
                - text: (b) for use in Crimea or Sevastopol.
            - cell [ref=e1396]

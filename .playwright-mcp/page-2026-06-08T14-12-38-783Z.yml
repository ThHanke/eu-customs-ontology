          - row "TM904 Preferences granted under the agreement between the European Union and Morocco in force from 19 July 2019. As of 3 October 2025, products originating in Western Sahara subject to controls by the customs authorities of the Kingdom of Morocco shall benefit from trade preferences under the terms of the new Agreement in the form of exchange of letters between the EU and Morocco, The European Union and the Kingdom of Morocco have agreed to allow those products to be identified by reference to the region of origin to be included in the proof of origin and as provided for in Protocol 4. In view of the application of these measures, the origin certificates codes U179 and U180 must be declared. The country code to be entered in the origin declaration when these proofs of origin are used is “2000”." [ref=e1402]:

          - row [ref=e1380]:
            - cell "CD860" [ref=e1381]
            - cell [ref=e1382]
            - cell [ref=e1383]:
              - generic [ref=e1384]:
                - text: "According to Council Regulation (EU) 2022/263 (OJ L42I, p. 77):"
                - text: I. It shall be prohibited to import into the European Union goods originating in non-government controlled areas of the Donetsk, Kherson, Luhansk and Zaporizhzhia oblasts of Ukraine.
                - text: "The import prohibitions not apply in respect of:"
                - text: (a) the execution until 24 May 2022 of trade contracts concluded before 23 February 2022, or of ancillary contracts necessary for the execution of such contracts, provided that the natural or legal person, entity or body seeking to perform the contract has notified, at least 10 working days in advance, the activity or transaction to the competent authority of the Member State in which they are established;
                - text: (b) goods originating in the specified territories which have been made available to the Ukrainian authorities for examination, for which compliance with the conditions conferring entitlement to preferential origin has been verified and for which a certificate of origin has been issued in accordance with the EU-Ukraine Association Agreement.
                - text: "II. It shall be prohibited to sell, supply, transfer or export goods and technology listed in Annex II to Council Regulation (EU) 2022/263:"
                - text: (a) to any natural or legal person, entity or body in the specified territories, or
                - text: "(b) for use in the specified territories. Annex II shall include certain goods and technologies suited for use in the following key sectors:"
                - text: (i) transport;
                - text: (ii) telecommunications;
                - text: (iii) energy;
                - text: (iv) the prospecting, exploration and production of oil, gas and mineral resources.
                - text: The prohibitions in point II above shall be without prejudice to the execution until 24 August 2022 of an obligation arising from a contract concluded before 23 February 2022, or from ancillary contracts necessary for the execution of such contracts, provided that the competent authority has been informed at least five working days in advance.
            - cell [ref=e1385]

        - table [ref=e610]:
          - rowgroup [ref=e611]:
            - row [ref=e612]:
              - cell "TN701" [ref=e613]
              - cell [ref=e614]
              - cell [ref=e615]:
                - generic [ref=e616]:
                  - text: According to Council Regulation (EU) No 692/2014 (OJ L183, p. 9) it shall be prohibited to import into European Union goods originating in Crimea or Sevastopol.
                  - text: The prohibition shall not apply in respect of goods originating in Crimea or Sevastopol which have been made available to the Ukrainian authorities for examination, for which compliance with the conditions conferring entitlement to preferential origin has been verified and for which a certificate of origin has been issued in accordance with the Association Agreement between the European Union and its Member States, of the one part, and Ukraine, of the other part.
                  - text: "-------------------------"
                  - text: "According to Council Regulation (EU) 2022/263 (OJ L42I, p. 77):"
                  - text: It shall be prohibited to import into the European Union goods originating in non-government controlled areas of the Donetsk, Kherson, Luhansk and Zaporizhzhia oblasts of Ukraine.
                  - text: The import prohibitions shall not apply in respect of goods originating in the specified territories which have been made available to the Ukrainian authorities for examination, for which compliance with the conditions conferring entitlement to preferential origin has been verified and for which a certificate of origin has been issued in accordance with the Association Agreement between the European Union and its Member States, of the one part, and Ukraine, of the other part.

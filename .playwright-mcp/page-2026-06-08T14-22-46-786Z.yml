          - generic [ref=e656]:
            - paragraph [ref=e657]: Upon completing the criteria with the desired information, the user can press "Search" in the bottom right area to search with the selected criteria, or "Clear Form" to reset the form and empty the fields.
            - figure "Class Consultation Actions" [ref=e658]:
              - img
              - generic [ref=e659]: Class Consultation Actions
            - heading "2. CLASS Consultation Results" [level=3] [ref=e660]
            - paragraph [ref=e661]:
              - text: All the results of CLASS entries matching the selected criteria in the search, will be presented in a list on a new page. The columns of the list are the
              - generic [ref=e662]: Commodity Code
              - text: and its description. The list is using the accordion type, meaning that all the list elements can be expanded within the list, in order for the user to explore the details of each entry.
            - paragraph [ref=e663]: Depending on the sources of the CLASS entry, different options are available to the user. Another level of detail can be seen depending on the origin of the information.
            - paragraph [ref=e664]: When the user searches free text in combination with search criteria in the Classification Information section in all five information types, the application will search for all combined matches of this, AND operation, in the Classification documents and only for the free text in CN Notes, TARIC, ECICS and BTI.
            - paragraph [ref=e665]: When the user searches with search criteria in the Classification Information section in combination with either a single commodity or a commodity code range in all five information types, the application will search for all combined matches of this, AND operation, in the Classification documents and only for the commodity code (range) in CN Notes, TARIC, BTI and ECICS.
            - paragraph [ref=e666]: When the user searches with search criteria in the Classification Information section in all five information types, the application will search for all combined matches of this, AND operation, in the Classification documents.
            - paragraph [ref=e667]: All the documents can be downloaded, using the button with a downwards pointing arrow.
            - paragraph [ref=e668]:
              - text: Additionally, any TARIC related information can be further detailed, by visiting the DDS2-TARIC, pressing the corresponding button
              - generic [ref=e669]: Show in DDS2-TARIC
              - text: .
            - paragraph [ref=e670]:
              - text: If ECICS information is requested and found, the system will display additional information in the results page. The CUS Number in ECICS information will redirect the user to the corresponding page in
              - generic [ref=e671]: DDS2-ECICS
              - text: .
            - paragraph [ref=e672]:
              - text: If EBTI information is requested and found, the system will display additional information in the Results page. The ‘BTI’ reference will redirect the user to the corresponding page in
              - generic [ref=e673]: DDS2-EBTI
              - text: .
            - paragraph [ref=e674]:
              - text: At the top of the page, a list of the defined criteria is shown, and the user is offered with the option to alter these criteria, by pressing the
              - generic [ref=e675]: Edit Search Criteria
              - text: button. This will redirect him/her to the search page, with the used criteria prefilled.
            - paragraph [ref=e676]: A Back button has been added at the bottom of the Results page. It has the same behaviour as the Edit Search Criteria button.
            - figure "CLASS Consultation Results" [ref=e677]:
              - img
              - generic [ref=e678]: CLASS Consultation Results
            - heading "3. Search Query Syntax" [level=3] [ref=e679]
            - paragraph [ref=e680]: The way in which the search query is formed can have an impact on the search results. Other configurations and built-in algorithms have their impact as well.
            - paragraph [ref=e681]: Below are some aspects to consider in order to understand the returned results.
            - heading "Exact match" [level=4] [ref=e682]
            - paragraph [ref=e683]: Use double quotes to receive results where the quoted search term is exactly matched in terms of order and without stemming. This is case insensitive.
            - paragraph [ref=e684]: For example, searching for "better regulations" will only return documents where this is matched. It will not match better regulation or better use of regulations
            - heading "Operators" [level=4] [ref=e685]
            - heading "Logical Operators:" [level=5] [ref=e686]
            - text: AND
            - paragraph [ref=e687]: Use AND between two terms to get results that only contain both terms regardless of their location. For example search for Better AND Regulation will return documents that contain both terms such as Better understanding of regulations and regulations for better services
            - text: OR
            - paragraph [ref=e688]: Use OR to between two terms to get results that contain either term or both at the same time. For example searching for Better OR regulations will return better use of IT and better regulations of IT services and sick leave regulations
            - paragraph [ref=e689]: "Note: Default operator is set to OR by default unless configured differently."
            - heading "Inclusion/Exclusion" [level=4] [ref=e690]
            - paragraph [ref=e691]: Use the minus symbol - to exclude results that contain a term. For example Better -Regulations will return documents that contain Better but not Regulations
            - paragraph [ref=e692]: The use of + however does not force the results to include the term.
            - paragraph [ref=e693]: "Notes:"
            - paragraph [ref=e694]: Minus symbol should be prepended by a space
            - paragraph [ref=e695]: Minus symbol should not be followed by a space
            - heading "Wildcards" [level=4] [ref=e696]
            - paragraph [ref=e697]: "The supported wildcard operators are the following:"
            - paragraph [ref=e698]: "1. The asterisk * : that matches zero or more characters. 2. The question mark ?: that matches any single character. (e.g. f?rm will match farm, form and firm)"
            - paragraph [ref=e699]: "Notes:"
            - list [ref=e700]:
              - listitem [ref=e701]: The use of wildcards might not be always helpful since the query terms are not stemmed when included in a wildcard pattern (e.g. fermented* will not match fermented because it is stemmed in the index to ferment but not stemmed in the search query)
              - listitem [ref=e702]: As stated by Elastic, using patterns with * or ? at the beginning can increase the iterations needed to find matching terms and slow search performance.
          - generic [ref=e703]:
            - heading "Stemming" [level=4] [ref=e704]
            - list [ref=e705]:
              - listitem [ref=e706]: "Search terms are stemmed to their morphological root. For example: searching for player will match play, playing, players, playful, and so on because it is stemmed to play"
              - listitem [ref=e707]: Terms are also stemmed on the index time in order to match the stemmed query terms. For example if the ingested content contais playing it is indexed as play
              - listitem [ref=e708]: Pay attention when using wildcards and double quotes because this stops the stemming for example searching for playin* will not find play
              - listitem [ref=e709]:
                - text: Stemming is language dependent; this means that the term is stemmed to its morphological root in the language specified in the search or ingestion command.
                - list [ref=e710]:
                  - listitem [ref=e711]: For example ingesting the word playing in a french document will not make it stemmed to play because it is not a French word.
                  - listitem [ref=e712]: On the same time, if you search for écriture in English, this will not find documents where écrit is mentioned because it is not an English word hence it does not have a morphological root.
              - listitem [ref=e713]: musicale will not find musique the morphological root for musicale is music not musiq
              - listitem [ref=e714]: households will be stemmed into household thus it will not match housing or holders
            - heading "Tokenization" [level=4] [ref=e715]
            - paragraph [ref=e716]: We use the built-in standard tokenizer from Elastic Search that provides grammar based tokenization (based on the Unicode Text Segmentation algorithm).
            - paragraph [ref=e717]: "For example report-summary is tokenized into two items: report summary while report_summary is tokenized to only one item: report_summary"
            - heading "4. Download Online User Manual" [level=3] [ref=e718]
            - paragraph [ref=e719]: The application also allows the users to access the manual for CLASS Consultation by clicking on the information button that exists in every page.
            - img
            - paragraph [ref=e720]: When the button is clicked, a dropdown menu emerges with two options, the "Online Documentation" and the "Releases Information"; and once the user selects the "Online Documentation", this is opened in a new tab. After waiting for the new page to load, the manual can now be read directly by the user in the browser or be downloaded as a PDF.
            - img
            - paragraph [ref=e721]: By pressing the PDF button located in top right corner of the manual page, the PDF is downloaded to the users default Downloads folder, as CLASS_Consultation.pdf, when accessed by CLASS Consultation page.
            - heading "5. Release Notes" [level=3] [ref=e722]
            - paragraph [ref=e723]: The list of features provided by every CLASS release is reflected within the "Releases Information" page which can be accessed by clicking on the 'information' button that exists in every page of CLASS Consultation. When the button is clicked, a dropdown menu emerges with two options, the "Online Documentation" (that is the current page) and the "Releases Information"; and once the user selects the "Releases Information", this is opened in a new tab.
          - generic [ref=e724]:
            - img
